name: Deploy landing page to GitHub Pages

# Thin caller of the shared infra-public Pages reusable (SHA-pinned).
# Publishes the static site at the repo root to GitHub Pages.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    uses: githumps/infra-public/.github/workflows/deploy.pages.yml@cd83e5727c0a7b904f780960664a51b3a3a0c685
    with:
      artifact_path: "."
