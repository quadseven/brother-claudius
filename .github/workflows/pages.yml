name: Deploy landing page to GitHub Pages

# Publishes the static site at the repo root (index.html + assets/ + CNAME)
# to GitHub Pages on the apex domain brotherclaudi.us. Plugin/marketplace
# files (.claude-plugin/, hooks/, SKILL.md, etc.) ride along in the artifact
# but are inert as static content — they don't affect the rendered page.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege tokens required by the Pages deploy actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; let an in-progress run finish so a publish
# is never interrupted mid-flight.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site (repo root)
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
