name: Deploy landing page to GitHub Pages

# Thin caller of the shared infra-public Pages reusable (SHA-pinned).
# Publishes the static site at the repo root to GitHub Pages.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# NOTE: no top-level concurrency block here - the called reusable
# (quadseven/infra-public/.github/workflows/deploy.pages.yml) already
# declares `concurrency: {group: pages}` on its own `deploy` job. A
# caller-level block using the SAME group name deadlocks: the top-level
# workflow run occupies 'pages' and then its own child job tries to
# enter 'pages' again, so GitHub cancels the run instantly ("deadlock
# detected ... between a top level workflow and 'deploy'"). This broke
# every deploy here since 2026-07-14 (the site was serving a stale
# pre-2026-07-10 build) until diagnosed 2026-07-20. quadseven/conducted's
# deploy.yml calls the same reusable WITHOUT a caller-level concurrency
# block and has never had this problem - match that pattern.
jobs:
  deploy:
    uses: quadseven/infra-public/.github/workflows/deploy.pages.yml@cd83e5727c0a7b904f780960664a51b3a3a0c685
    with:
      artifact_path: "."
